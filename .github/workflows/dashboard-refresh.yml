name: AI Dashboard Refresh

on:
  workflow_dispatch:
    inputs:
      routine:
        description: "VPS-Routine (Hinweis — läuft nur mit n8n-Webhook; GH baut JSON neu)"
        required: false
        default: dashboard
        type: string
      agent_id:
        description: "Manager-ID (optional)"
        required: false
        default: ""
        type: string
  repository_dispatch:
    types: [dashboard-refresh]

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout KiezQuiz-Ops
        uses: actions/checkout@v4
        with:
          repository: Lauer-Team/KiezQuiz-Ops
          token: ${{ secrets.GITHUB_TOKEN }}
          path: KiezQuiz-Ops

      - name: Install Python deps
        working-directory: KiezQuiz-Ops
        run: pip install -r scripts/requirements-ops.txt

      - name: Build dashboard JSON
        working-directory: KiezQuiz-Ops
        env:
          GSC_TOKEN_JSON: ${{ secrets.GSC_TOKEN_JSON }}
          ROUTINE: ${{ github.event.inputs.routine || 'dashboard' }}
          AGENT_ID: ${{ github.event.inputs.agent_id || '' }}
        run: python3 scripts/build_ai_dashboard_data.py

      - name: Upload to Supabase Storage
        working-directory: KiezQuiz-Ops
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/upload_ai_dashboard.py
