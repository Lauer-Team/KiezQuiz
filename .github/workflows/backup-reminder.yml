name: Supabase backup reminder

on:
  schedule:
    # 2. des Monats, 09:00 UTC — einen Tag nach dem automatischen Backup (1.)
    - cron: "0 9 2 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate iCloud SMTP secrets
        env:
          KIEZ_ICLOUD_LOGIN: ${{ secrets.KIEZ_ICLOUD_LOGIN }}
          KIEZ_ICLOUD_APP_PASSWORD: ${{ secrets.KIEZ_ICLOUD_APP_PASSWORD }}
        run: |
          if [ -z "$KIEZ_ICLOUD_LOGIN" ] || [ -z "$KIEZ_ICLOUD_APP_PASSWORD" ]; then
            echo "::error::GitHub Secrets KIEZ_ICLOUD_LOGIN und KIEZ_ICLOUD_APP_PASSWORD fehlen."
            echo "Apple-ID (@icloud.com) + App-Passwort → GitHub Secrets → Actions"
            exit 1
          fi

      - name: Send monthly backup reminder
        env:
          KIEZ_ICLOUD_LOGIN: ${{ secrets.KIEZ_ICLOUD_LOGIN }}
          KIEZ_ICLOUD_APP_PASSWORD: ${{ secrets.KIEZ_ICLOUD_APP_PASSWORD }}
          KIEZ_BACKUP_REMINDER_TO: info@kiezquiz.de
        run: python3 scripts/send_backup_reminder.py --send
