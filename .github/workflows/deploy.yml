name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Supabase config from secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node -e "
            const fs = require('fs');
            const url = process.env.VITE_SUPABASE_URL || process.env.SUPABASE_URL;
            const key = process.env.VITE_SUPABASE_ANON_KEY || process.env.SUPABASE_ANON_KEY;
            if (!url || !key) {
              console.error('Missing GitHub secrets: set VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY (or SUPABASE_URL + SUPABASE_ANON_KEY).');
              process.exit(1);
            }
            fs.writeFileSync(
              'src/supabaseConfig.js',
              '// Generated at deploy — do not commit.\n' +
              'window.SUPABASE_CONFIG = {\n' +
              '  url: ' + JSON.stringify(url) + ',\n' +
              '  anonKey: ' + JSON.stringify(key) + '\n' +
              '};\n'
            );
          "

      - name: Generate SEO pages and sitemap
        run: |
          python3 scripts/generate_seo_pages.py
          python3 scripts/generate_sitemap.py
          python3 scripts/generate_legal_static.py

      - name: Prepare static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude .git \
            --exclude .github \
            --exclude node_modules \
            --exclude _site \
            . _site/
          python3 scripts/stamp_build.py "${{ github.sha }}" _site

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
