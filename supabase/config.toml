# KiezQuiz — Supabase CLI (lokal + Remote-Push)
# Remote-Projekt: https://supabase.com/dashboard/project/iuixaesbzftgmnmelcad
# Anleitung: docs/SUPABASE-MIGRATIONS.md

project_id = "kiezquiz"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://kiezquiz.de", "https://www.kiezquiz.de"]
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = true
