<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="kiezquiz-build" content="dev">
  <meta name="kiezquiz-design" content="5">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>KiezQuiz · Spieler-Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0f1118">
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/icons/favicon-48.png" type="image/png" sizes="48x48">
  <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/icons/favicon-16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <script>
  (function(){try{var R='kiezquiz_theme_rollout_auto';if(localStorage.getItem(R)!=='1'){localStorage.setItem('kiezquiz_theme_auto','1');var t=localStorage.getItem('kiezquiz_theme');if(t==='auto')localStorage.removeItem('kiezquiz_theme');localStorage.setItem(R,'1');}var a=localStorage.getItem('kiezquiz_theme_auto');var auto=a!=='0';var r=localStorage.getItem('kiezquiz_theme');if(auto){var h=new Date().getHours();r=(h>=7&&h<19)?'light':'dark';}else{r=r==='light'?'light':'dark';}if(r==='light'){document.documentElement.dataset.theme='light';document.documentElement.style.colorScheme='light';var m=document.querySelector('meta[name="theme-color"]');if(m)m.content='#F1ECE0';}}catch(e){}})();
  </script>
  <link rel="stylesheet" href="../src/styles/brand.css">
  <link rel="stylesheet" href="../src/styles/app.css">
  <link rel="stylesheet" href="../src/styles/base.css">
  <link rel="stylesheet" href="../src/styles/hub.css">
  <link rel="stylesheet" href="../src/styles/modals.css">
  <link rel="stylesheet" href="../src/styles/profile.css">
  <link rel="stylesheet" href="../src/styles/admin.css">
  <link rel="stylesheet" href="../src/styles/redesign.css">
  <link rel="stylesheet" href="../src/styles/device/desktop.css">
  <link rel="stylesheet" href="../src/styles/device/tablet.css">
  <link rel="stylesheet" href="../src/styles/device/phone.css">
  <link rel="stylesheet" href="../src/styles/device/touch.css">
  <link rel="stylesheet" href="../src/styles/legal.css">
  <script src="../src/theme.js"></script>
  <script>window.KIEZ_SRC_BASE = '../src/';</script>
  <script src="../src/viewRouter.js"></script>
  <script src="../src/playerRedirect.js"></script>
  <script src="../src/versionGuard.js"></script>
</head>
<body class="profile-page-body kq" data-theme="dark" data-i18n-scope="profile">
  <div class="app-shell kq profile-app-shell" data-theme="dark">
    <header class="app-header global-header kq-topbar" id="app-header">
      <a href="/" class="brand brand-link" data-i18n-title="header.homeTitle" title="Zur Startseite">
        <img class="brand-logo" src="/assets/brand/logo/wortmarke-invers.svg" width="148" height="36" alt="" aria-hidden="true">
        <h1 class="brand-title visually-hidden">KiezQuiz</h1>
        <span class="badge" id="header-badge" data-i18n="profilePage.title">Dashboard</span>
      </a>

      <nav id="header-hub-nav" class="header-hub-nav kq-navlinks" aria-label="Landingpage"></nav>

      <div id="header-city-tabs" class="header-city-tabs" hidden></div>

      <div class="stats-bar">
        <div class="stat-pill streak-pill" data-i18n-title="header.streakTitle" title="Deine aktuelle Antwortserie">
          <div class="streak-info">
            <div class="streak-current">
              <span class="label" data-i18n="header.streakLabel">Serie 🔥:</span>
              <span class="value" id="stat-streak">0x</span>
            </div>
            <div class="streak-best" id="stat-best-streak">Beste: 0x</div>
          </div>
        </div>

        <a href="/profile/" class="stat-pill xp-pill stat-pill-link xp-pill--active" id="btn-xp-pill" data-i18n-title="header.profileTitle" title="Profil & Bestenliste">
          <div class="xp-pill-body">
            <div class="xp-pill-row">
              <span class="label" data-i18n="header.xpLabel">XP:</span>
              <span class="value" id="stat-xp">0</span>
              <span class="rank-name" id="stat-rank">Neuling</span>
            </div>
            <div class="progress-bg xp-pill-progress" aria-hidden="true">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
          </div>
        </a>

        <button type="button" class="auth-pill" id="auth-pill" data-i18n-title="header.authTitle" title="">
          <span class="auth-pill-icon">👤</span>
          <span class="auth-pill-label" data-i18n="header.guest">Gast</span>
          <span class="auth-pill-action" data-i18n="header.login">Anmelden</span>
        </button>

        <button type="button" class="changelog-header-btn" data-changelog-trigger data-i18n-title="header.changelogTitle" title="Alle Updates und Neuerungen">
          <span class="changelog-header-icon" aria-hidden="true">✨</span>
          <span class="changelog-header-label" data-i18n="footer.changelog">Was ist neu?</span>
        </button>

        <button class="audio-toggle" id="btn-mute" data-i18n-title="header.soundTitle" title="Sound ein/ausschalten">🔊</button>
        <button class="audio-toggle lang-toggle" id="btn-lang" data-i18n-title="header.langSwitchToEn" title="Switch to English">🇩🇪</button>
      </div>
    </header>

    <div class="profile-app" id="profile-app">
      <aside class="profile-sidebar" id="profile-sidebar" hidden>
        <nav class="profile-nav" aria-label="Profil">
          <button type="button" class="profile-nav-item is-active" data-section="dashboard" data-i18n="profilePage.navDashboard">Dashboard</button>
          <button type="button" class="profile-nav-item" data-section="friends" data-i18n="profilePage.navFriends">Freunde</button>
          <button type="button" class="profile-nav-item" data-section="leaderboard" data-i18n="profilePage.navLeaderboard">Bestenliste</button>
          <button type="button" class="profile-nav-item" data-section="account" data-i18n="profilePage.navAccount">Konto</button>
          <button type="button" class="profile-nav-item" data-section="settings" data-i18n="profilePage.navSettings">Einstellungen</button>
        </nav>
        <div class="profile-admin-nav" id="profile-admin-nav" hidden>
          <p class="profile-admin-nav-label" data-i18n="profilePage.adminNavLabel">Admin</p>
          <nav class="profile-nav profile-nav--admin" id="profile-admin-nav-list" aria-label="Admin"></nav>
        </div>
      </aside>

      <div class="profile-main-column">
        <div class="profile-page-head">
          <span class="profile-page-eyebrow mono" data-i18n="profilePage.subtitle">Dein Dashboard</span>
          <h2 class="profile-page-title" id="profile-page-title" data-i18n="profilePage.navDashboard">Dashboard</h2>
        </div>

        <main id="profile-main" class="profile-main">
          <div class="profile-state profile-state--loading" id="profile-state-loading">
            <p data-i18n="profilePage.loading">Wird geladen…</p>
          </div>
        </main>
      </div>
    </div>

    <footer class="app-footer">
      <nav class="footer-legal-links" aria-label="Rechtliches">
        <a href="/datenschutz/" data-i18n="footer.privacyLink">Datenschutz</a>
        <span class="footer-legal-sep" aria-hidden="true">·</span>
        <a href="/impressum/" data-i18n="footer.imprintLink">Impressum</a>
        <span class="footer-legal-sep" aria-hidden="true">·</span>
        <a href="/nutzungsbedingungen/" data-i18n="footer.termsLink">Nutzungsbedingungen</a>
        <span class="footer-legal-sep" aria-hidden="true">·</span>
        <a href="/lizenzen/" data-i18n="footer.licensesLink">Lizenzen</a>
        <span class="footer-legal-sep" aria-hidden="true">·</span>
        <button type="button" class="footer-legal-btn" data-cookie-settings data-i18n="footer.cookieSettings">Cookie-Einstellungen</button>
      </nav>
      <p class="footer-copyright" data-i18n="footer.copyright">© 2026 KiezQuiz. Alle Rechte vorbehalten.</p>
    </footer>
  </div>

  <script src="../src/ui/icons.js"></script>
  <script src="../src/i18n.js"></script>
  <script src="/assets/js/supabase-2.49.8.min.js"></script>
  <script>window.SUPABASE_CONFIG = window.SUPABASE_CONFIG || {};</script>
  <script src="../src/supabaseConfig.js"></script>
  <script src="../src/auth.js"></script>
  <script src="../src/data/cities.js"></script>
  <script src="../src/cityRegistry.js"></script>
  <script src="../src/cityWishes.js"></script>
  <script src="../src/playerActivity.js"></script>
  <script src="../src/saveManager.js"></script>
  <script src="../src/game/config.js"></script>
  <script src="../src/game/progress.js"></script>
  <script src="../src/loadScript.js"></script>
  <script src="../src/game/effects.js"></script>
  <script src="../src/ui/modals.js"></script>
  <script src="../src/leaderboard.js"></script>
  <script src="../src/social.js"></script>
  <script src="../src/cloudSync.js"></script>
  <script src="../src/data/changelog.js"></script>
  <script src="../src/ui/changelog.js"></script>
  <script src="../src/ui/globalHeader.js"></script>
  <script src="../src/ui/hub.js"></script>
  <script src="../src/ui/hubScrollTop.js"></script>
  <script src="../src/ui/adminSections.js"></script>
  <script src="../src/ui/profilePage.js"></script>
  <script src="../src/ui/cookieConsent.js"></script>
</body>
</html>
