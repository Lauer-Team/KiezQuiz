<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>KiezQuiz · Spieler-Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0f1118">
  <link rel="icon" href="/icons/favicon.ico" sizes="32x32">
  <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/icons/favicon-16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400;10..48,600;10..48,700;10..48,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../src/styles/brand.css">
  <link rel="stylesheet" href="../src/styles/app.css">
  <link rel="stylesheet" href="../src/styles/base.css">
  <link rel="stylesheet" href="../src/styles/modals.css">
  <link rel="stylesheet" href="../src/styles/profile.css">
  <link rel="stylesheet" href="../src/styles/redesign.css">
  <script src="../src/theme.js"></script>
  <script>window.KIEZ_SRC_BASE = '../src/';</script>
  <script src="../src/viewRouter.js"></script>
  <script src="../src/playerRedirect.js"></script>
</head>
<body class="profile-page-body kq" data-theme="dark" data-i18n-scope="profile">
  <div class="profile-app" id="profile-app">
    <aside class="profile-sidebar" id="profile-sidebar" hidden>
      <div class="profile-sidebar-brand">
        <a href="/" class="profile-back-link" data-i18n="profilePage.backToLanding">← Landingpage</a>
        <p class="profile-sidebar-title" data-i18n="profilePage.title">Profil</p>
      </div>
      <nav class="profile-nav" aria-label="Profil">
        <button type="button" class="profile-nav-item is-active" data-section="dashboard" data-i18n="profilePage.navDashboard">Übersicht</button>
        <button type="button" class="profile-nav-item" data-section="achievements" data-i18n="profilePage.navAchievements">Erfolge</button>
        <button type="button" class="profile-nav-item" data-section="friends" data-i18n="profilePage.navFriends">Freunde</button>
        <button type="button" class="profile-nav-item" data-section="leaderboard" data-i18n="profilePage.navLeaderboard">Bestenliste</button>
        <button type="button" class="profile-nav-item" data-section="account" data-i18n="profilePage.navAccount">Konto</button>
      </nav>
    </aside>

    <div class="profile-main-column">
      <header class="profile-topbar">
        <div class="profile-topbar-text">
          <p class="profile-topbar-eyebrow" data-i18n="profilePage.subtitle">Dein Dashboard</p>
          <h1 id="profile-page-title" data-i18n="profilePage.navDashboard">Übersicht</h1>
        </div>
        <div class="profile-topbar-actions">
          <button type="button" class="auth-pill profile-auth-pill" data-i18n-title="header.authTitle" title="">
            <span class="auth-pill-icon">👤</span>
            <span class="auth-pill-label" data-i18n="header.guest">Gast</span>
            <span class="auth-pill-action" data-i18n="header.login">Anmelden</span>
          </button>
        </div>
      </header>

      <main id="profile-main" class="profile-main">
        <div class="profile-state profile-state--loading" id="profile-state-loading">
          <p data-i18n="profilePage.loading">Wird geladen…</p>
        </div>
      </main>
    </div>
  </div>

  <script src="../src/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../src/supabaseConfig.js"></script>
  <script src="../src/auth.js"></script>
  <script src="../src/data/cities.js"></script>
  <script src="../src/cityRegistry.js"></script>
  <script src="../src/cityWishes.js"></script>
  <script src="../src/ui/adminBar.js"></script>
  <script src="../src/saveManager.js"></script>
  <script src="../src/game/config.js"></script>
  <script src="../src/game/progress.js"></script>
  <script src="../src/game/effects.js"></script>
  <script src="../src/leaderboard.js"></script>
  <script src="../src/social.js"></script>
  <script src="../src/cloudSync.js"></script>
  <script src="../src/ui/profilePage.js"></script>
</body>
</html>
