<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Hanken+Grotesk:wght@500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      background: radial-gradient(120% 100% at 85% 0%, #1d2335 0%, #0F1118 60%);
      color: #FCFBF8;
      position: relative;
    }
    .wrap {
      width: 1200px;
      height: 630px;
      padding: 54px 58px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }
    .brand-block { flex: 1; min-width: 0; }
    .pin-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }
    .pin-row svg { width: 52px; height: auto; flex-shrink: 0; }
    .wordmark {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-weight: 800;
      font-size: 72px;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #FCFBF8;
    }
    .claim {
      font-size: 34px;
      font-weight: 600;
      color: #9AA0B0;
      line-height: 1.25;
      max-width: 680px;
    }
    .kalle {
      width: 220px;
      height: auto;
      flex-shrink: 0;
      margin-top: 8px;
    }
    .footer-line {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #FF5233;
    }
    .accent-dot {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,82,51,0.18) 0%, transparent 70%);
      top: -80px;
      left: -60px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="accent-dot"></div>
  <div class="wrap">
    <div class="top">
      <div class="brand-block">
        <div class="pin-row">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 124" fill="none" aria-hidden="true">
            <path fill="#FF5233" fill-rule="evenodd" d="M50 4 C25.7 4 6 23.7 6 48 C6 80 50 120 50 120 C50 120 94 80 94 48 C94 23.7 74.3 4 50 4 Z M50 30 C40 30 31.9 38.1 31.9 48.1 C31.9 58.1 40 66.2 50 66.2 C60 66.2 68.1 58.1 68.1 48.1 C68.1 38.1 60 30 50 30 Z"></path>
            <line x1="54" y1="50" x2="73" y2="69" stroke="#FF5233" stroke-width="13.5" stroke-linecap="round"></line>
          </svg>
          <div class="wordmark">KiezQuiz</div>
        </div>
        <p class="claim">Besser wissen als Besserwissen.</p>
      </div>
      <svg class="kalle" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 250" fill="none" aria-hidden="true">
        <defs><linearGradient id="neck" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2BC4B4"></stop><stop offset="1" stop-color="#9B7BFF"></stop></linearGradient></defs>
        <g stroke="#FF5233" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M112 196 L108 226"></path><path d="M108 226 l-9 -4 M108 226 l0 -6 M108 226 l9 -4"></path><path d="M140 198 L144 226"></path><path d="M144 226 l-9 -4 M144 226 l0 -6 M144 226 l9 -4"></path></g>
        <path d="M70 150 L14 176 L22 188 L44 180 L46 196 L66 182 Z" fill="#5E6A86"></path>
        <ellipse cx="120" cy="138" rx="64" ry="56" fill="#8C97AD" transform="rotate(-6 120 138)"></ellipse>
        <path d="M148 106 C170 126 160 162 120 180 C100 168 90 140 100 120 C115 106 138 100 148 106 Z" fill="#6E7A95"></path>
        <g stroke="#5E6A86" stroke-width="3" stroke-linecap="round" fill="none"><path d="M134 124 C126 140 116 154 110 166"></path><path d="M146 134 C138 150 128 162 120 172"></path></g>
        <ellipse cx="152" cy="108" rx="15" ry="24" fill="url(#neck)" transform="rotate(18 152 108)"></ellipse>
        <circle cx="172" cy="78" r="31" fill="#97A1B6"></circle>
        <path d="M176 63 q7 -3 12 1" stroke="#0F1118" stroke-width="2.4" stroke-linecap="round" fill="none"></path>
        <path d="M200 72 L222 80 L200 90 Z" fill="#F4B53C"></path>
        <circle cx="182" cy="72" r="5" fill="#0F1118"></circle><circle cx="184" cy="70" r="1.6" fill="#fff"></circle>
      </svg>
    </div>
    <p class="footer-line">Hamburg · Berlin · Frankfurt · kiezquiz.de</p>
  </div>
</body>
</html>
